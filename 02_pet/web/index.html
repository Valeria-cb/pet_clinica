<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha seu pet</title>
  <link rel="stylesheet" href="/02_pet/web/css/pet.css">
  <link rel="stylesheet" href="/css_padrao/global.css">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">

    <header>
      <div class="menu">
        <img class="menu-logo" src="/imgs_padrao/logo.svg" alt="petclinic">

        <nav>
          <ul class="ind-progresso">
            <li><img src="/imgs_padrao/pet01.svg" alt=""></li>
            <li><img src="/imgs_padrao/profissional02.svg" alt=""><br></li>
            <li><img src="/imgs_padrao/agendamento03.svg" alt=""></li>
            <li><img src="/imgs_padrao/cadastro04.svg" alt=""></li>
            <li><img src="/imgs_padrao/confirmacao05.svg" alt=""></li>
          </ul>

          <hr class="linha-horizontal1">
          <hr class="linha-horizontal2">
          <hr class="linha-horizontal3">
          <hr class="linha-horizontal4">

          <ul class="texto-progresso">
            <li id="pet">pet</li>
            <li id="profissional">profissional</li>
            <li id="agendamento">agendamento</li>
            <li id="cadastro">cadastro</li>
            <li id="confirmacao">confirmação</li>
          </ul>
        </nav>

        <div class="texto-central">
          <h1>ESCOLHA O SEU PET</h1>
          <h4>Nos conte, qual é o seu pet?</h4>
        </div>

        <div>
          <ul class="animais">
            <li id="img-cachorro"><img src="/02_pet/web/img/cachorro_.svg" alt=""></li>
            <li id="img-gato"><img src="/02_pet/web/img/gato_.svg" alt=""></li>
            <li id="img-aves"><img src="/02_pet/web/img/tucano.svg" alt=""></li>
            <li id="img-outros"><img src="/02_pet/web/img/coelho.svg" alt=""></li>
          </ul>

          <ul class="animais-botao">
            <button id="cachorro">CACHORRO</button>
            <button id="gato">GATO</button>
            <button id="aves">AVES</button>
            <button id="outros">OUTROS</button>
          </ul>
        </div>

        <footer>
          <div class="retangulo"></div>
          <button id="botao-cancelar">CANCELAR</button>
          <button id="botao-continuar">CONTINUAR</button>
        </footer>


    </header>
  </div>
</body>

</html>
